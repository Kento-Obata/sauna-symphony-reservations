name: CI

# main への push で本番へ即デプロイ(Netlify + Supabase)されるため、
# その前に型エラー・lint 違反・テスト失敗を止める最低限のゲート。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -p tsconfig.app.json --noEmit
      - run: npm run test
      - run: npm run build

  edge-functions:
    name: Edge functions (deno test / check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno test (shared pure logic)
        run: deno test supabase/functions/_shared/
